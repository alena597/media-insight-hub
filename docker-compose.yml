# Локальний або тестовий запуск: фронт (Nginx + dist) + API.
# Перед першим запуском: скопіюйте server/.env.example → server/.env і задайте JWT_SECRET.
#
# Запуск: docker compose up --build
# Відкрити: http://localhost:8080
# Для фронту в браузері запити йдуть на той самий хост → /api → проксі на API.

services:
  api:
    build: ./server
    environment:
      PORT: 4000
      DATABASE_PATH: /data/data.json
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-min-32-chars-long}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
    volumes:
      - mih-data:/data
    expose:
      - "4000"

  web:
    build: .
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mih-data:
